<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Messiah University">
    <meta name="description" content="Explore our campus through our interactive virtual tour and map.">

    <title>Explore our Campus - Messiah University</title>

    <link rel="shortcut icon" href="/favicon.ico">

    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/reset.css">
    <link rel="stylesheet" href="/assets/css/fonts.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/top-nav.css">
    <link rel="stylesheet" href="/assets/css/landing.css">
  </head>
  <body>
    <div class="video-bg-container">
      <iframe
        src="https://player.vimeo.com/video/465819862?background=1&autoplay=1&loop=1&byline=0&title=0"
        allow="autoplay; fullscreen"
        role="presentation"
        class="video-bg"
      ></iframe>
    </div>

    <nav class="top-nav" aria-label="External links">
      <a href="https://www.messiah.edu/request-info/" target="_blank" rel="noopener nofollow noreferrer" class="top-nav-link -primary">
        Request Info
      </a>
      <a href="https://www.messiah.edu/visit" target="_blank" rel="noopener nofollow noreferrer" class="top-nav-link -accent">
        Visit Campus
      </a>
    </nav>

    <main class="split">
      <h1 class="hidden">Explore our Campus</h1>

      <section class="panel -teal">
        <svg width="36" height="36" class="icon" role="presentation">
          <use href="/assets/images/symbol-defs.svg#map"></use>
        </svg>

        <h2>Campus Map</h2>
        <p>Browse buildings, facilities, and points of interest across our campus.</p>
        
        <a href="/campus-map" class="button -secondary">
          Explore Map
          <svg width="18" height="18" aria-hidden="true">
            <use href="/assets/images/symbol-defs.svg#next"></use>
          </svg>
        </a>
      </section>

      <div class="split-divider" aria-hidden="true"></div>

      <section class="panel -purple">
        <svg width="36" height="36" class="icon" role="presentation">
          <use href="/assets/images/symbol-defs.svg#tour"></use>
        </svg>

        <h2>Virtual Tour</h2>
        <p>Experience our campus through immersive 360-degree panoramic views.</p>

        <a href="/virtual-tour" class="button -secondary">
          Start Tour
          <svg width="18" height="18" aria-hidden="true">
            <use href="/assets/images/symbol-defs.svg#next"></use>
          </svg>
        </a>
      </section>
    </main>

    <div class="logo-bar">
      <img
        src="/assets/images/logo.svg"
        alt="Messiah University"
        width="200"
        height="54"
      >
    </div>
  </body>
</html>
